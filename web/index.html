<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <title>Ami Sampler — Web</title>
    <style>
      * { box-sizing: border-box; }
      html, body {
        margin: 0; height: 100%; background: #05051f; color: #fff;
        font-family: monospace; -webkit-font-smoothing: none;
        display: flex; align-items: center; justify-content: center; overflow: hidden;
      }
      #wrap { display: flex; flex-direction: column; align-items: center; gap: 6px; }
      #ami {
        image-rendering: pixelated; image-rendering: crisp-edges;
        border: 2px solid #1a1a5a;
        cursor: url(/res/amiMouseCursor.png) 0 0, default;
      }
      #ami.drag { border-color: #fc8a00; }
      #status { font-size: 11px; color: #6a6ad0; }
      #file-input { display: none; }
    </style>
  </head>
  <body>
    <div id="wrap">
      <canvas id="ami"></canvas>
      <div id="status">click to start audio…</div>
    </div>
    <input type="file" id="file-input" accept="audio/*,.wav,.aif,.aiff,.iff,.8svx,.brr,.ul,.ulaw,.mulaw" />
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
